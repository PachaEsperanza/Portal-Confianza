<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="icons/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portal de Proveedores - Acceso Privado</title>
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#7A1D2E" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Portal CTE" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <meta name="description" content="Portal exclusivo para proveedores. Gestione sus productos, lotes, órdenes y pagos de manera segura y privada." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=DM+Sans:ital,opsz,wght@0,9,40,300;0,9,40,400;0,9,40,500;0,9,40,600;0,9,40,700;1,9,40,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.5.0/remixicon.min.css">
    <script>
      // GitHub Pages SPA redirect fix
      (function() {
        var search = window.location.search;
        if (search.indexOf('?p=') === 0) {
          var decoded = decodeURIComponent(search.slice(3));
          var base = window.location.pathname.split('/').slice(0, 2).join('/');
          var newPath = base + (decoded ? '/' + decoded : '');
          window.history.replaceState(null, null, newPath);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
